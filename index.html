        <h1>Potato Daily — Random Picker for Scrum Daily Standups</h1>
        <p><strong>Potato Daily</strong> is a free random picker that helps Scrum Masters, agile coaches, and engineering teams run fair, fast daily standups by selecting who speaks next.</p>

      <section>
        <h2>What it does</h2>
        <p>Add your team, start a round, and the app counts down before randomly choosing one teammate to share their update. Picked teammates are removed from the pool until everyone has had a turn — so each daily standup feels fair and stays on time.</p>
      </section>

      <section>
        <h2>How to use Potato Daily</h2>
        <ol>
          <li>Add each team member by name. An avatar is generated automatically.</li>
          <li>Click start. A short countdown plays.</li>
          <li>The picker reveals one random teammate. They give their standup update.</li>
          <li>Continue until the pool is empty, then reset for the next ceremony.</li>
        </ol>
      </section>

      <section>
        <h2>Features</h2>
        <ul>
          <li>Free, no signup, no account.</li>
          <li>Works for daily standups, retrospectives, sprint planning, and refinement.</li>
          <li>Multilingual — English, Spanish, French (auto-detected).</li>
          <li>Team data stored locally in your browser. Nothing is uploaded.</li>
          <li>Responsive — works on mobile and desktop.</li>
        </ul>
      </section>

      <section>
        <h2>Frequently asked questions</h2>
        <h3>Is Potato Daily free?</h3>
        <p>Yes. No signup, no payment, no ads on team data.</p>
        <h3>Where is my team data stored?</h3>
        <p>In your browser via localStorage. Nothing is sent to a server.</p>
        <h3>Can I use it for retrospectives or sprint planning?</h3>
        <p>Yes. The random picker works for any Scrum or agile ceremony.</p>
